{% set name = "dnspython" %}
{% set version = "2.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 181d3c6996452cb1189c4046c61599b84a5a86e099562ffde77d26984ff26d0f

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<310]

requirements:
  host:
    - python
    - pip
    - hatchling >=1.21.0
  run:
    - python
    - idna >=2.1
    - cryptography >=2.6
  run_constrained:
    - cryptography >=45
    - httpcore >=1.0.0
    - httpx >=0.28.0
    - h2 >=4.2.0
    - aioquic >=1.2.0
    - idna >=3.10
    - trio >=0.30

test:
  imports:
    - dns
    - dns.rdtypes
    - dns.rdtypes.ANY
    - dns.rdtypes.IN
    - dns.rdtypes.CH
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://www.dnspython.org
  summary: DNS toolkit
  description: |
    dnspython is a DNS toolkit for Python. It supports almost all record types.
    It can be used for queries, zone transfers, and dynamic updates. It supports
    TSIG authenticated messages and EDNS0.
  license: ISC
  license_file: LICENSE
  license_family: OTHER
  dev_url: https://github.com/rthalley/dnspython
  doc_url: https://dnspython.readthedocs.io/

extra:
  recipe-maintainers:
    - synapticarbors
    - jan-janssen
